# Shared rules for anything that resyncs a CSI-synced secret and restarts a
# deployment. Grants nothing by itself - each env's RoleBinding
# (dev-rolebinding.yaml) binds it within just that one namespace, so no
# single principal gets cluster-wide access.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-ops-role
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
  # secret-create's apply-changes job applies the merged SecretProviderClass
  # directly rather than waiting on Argo CD's own sync - patch/create cover
  # both the update-existing and (future) create-new-SPC cases kubectl
  # apply can take depending on whether the object already exists.
  - apiGroups: ["secrets-store.csi.x-k8s.io"]
    resources: ["secretproviderclasses"]
    verbs: ["get", "list", "patch", "create"]

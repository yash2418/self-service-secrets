apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-ops-dev-runner
  namespace: runners-dev
  annotations:
    # IRSA - grants secretsmanager:GetSecretValue/PutSecretValue on dev/* secrets.
    # Pods in this ServiceAccount pick up these AWS creds automatically; no
    # GH OIDC->AWS step needed since the runner already lives in-cluster.
    eks.amazonaws.com/role-arn: "arn:aws:iam::951734991809:role/secret-ops-dev-runner-irsa"

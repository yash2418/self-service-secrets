# AWS Secrets Manager -> CSI driver -> k8s Secret `sample-api-service-secret`,
# which the deployment in this overlay reads via env[].valueFrom.secretKeyRef.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: sample-api-service-dev-spc
spec:
  provider: aws
  parameters:
    objects: |-
      - objectName: "dev/sample-api-service/app-secrets"
        objectType: "secretsmanager"
        jmesPath:
          - path: "DB_HOST"
            objectAlias: "DB_HOST"
          - path: "DB_PASSWORD"
            objectAlias: "DB_PASSWORD"
          - path: PAYMENT_BASE_URL
            objectAlias: PAYMENT_BASE_URL
          - path: BUCKET_NAME
            objectAlias: BUCKET_NAME
          - path: SENDGRID_URL
            objectAlias: SENDGRID_URL
          - path: SENDGRID_KEY
            objectAlias: SENDGRID_KEY
          - path: CORE_SERVICE_BASE_URL
            objectAlias: CORE_SERVICE_BASE_URL
          - path: USER_SERVICE_BASE_URL
            objectAlias: USER_SERVICE_BASE_URL
          - path: TEST_KEY
            objectAlias: TEST_KEY
          - path: REDIS_HOST
            objectAlias: REDIS_HOST
          - path: REPORTING_SVC_BASE_URL
            objectAlias: REPORTING_SVC_BASE_URL
  secretObjects:
    - secretName: sample-api-service-secret
      type: Opaque
      data:
        - objectName: "DB_HOST"
          key: DB_HOST
        - objectName: "DB_PASSWORD"
          key: DB_PASSWORD
        - objectName: PAYMENT_BASE_URL
          key: PAYMENT_BASE_URL
        - objectName: BUCKET_NAME
          key: BUCKET_NAME
        - objectName: SENDGRID_URL
          key: SENDGRID_URL
        - objectName: SENDGRID_KEY
          key: SENDGRID_KEY
        - objectName: CORE_SERVICE_BASE_URL
          key: CORE_SERVICE_BASE_URL
        - objectName: USER_SERVICE_BASE_URL
          key: USER_SERVICE_BASE_URL
        - objectName: TEST_KEY
          key: TEST_KEY
        - objectName: REDIS_HOST
          key: REDIS_HOST
        - objectName: REPORTING_SVC_BASE_URL
          key: REPORTING_SVC_BASE_URL

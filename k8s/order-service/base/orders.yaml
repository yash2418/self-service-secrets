apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  namespace: cilium-shop
  labels:
    app: orders
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
    spec:
      containers:
        - name: orders
          image: orders:v1
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: orders
  namespace: cilium-shop
  labels:
    app: orders
spec:
  selector:
    app: orders
  ports:
    - port: 8080
      targetPort: 8080

# Update flow: developer names an env var that's already wired up in the
# deployment. The workflow resolves it back to the AWS Secrets Manager
# secret + JSON key via the SecretProviderClass, writes the new value,
# forces the CSI-synced k8s Secret to be recreated, and restarts the
# deployment. Prod pauses for manual approval; every other overlay runs
# straight through.
#
# TODO before running:
#   - build infra/tools-image/Dockerfile and push it to <ECR_REPO>/argo-secret-ops-tools
#   - set deployment-repo-url default (or always pass it explicitly)
#   - confirm the directory/file naming under Kustomize/Services/<service>/Overlays/<environment>
#     matches what locate-secret-ref assumes (deployment*.yaml, *secretproviderclass*.yaml)
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: secret-update
  namespace: argo
spec:
  entrypoint: main
  serviceAccountName: secret-ops-sa
  arguments:
    parameters:
      - name: service
        value: "Admin_Auth_Service"
        enum:                        # TODO: fill in the rest of Kustomize/Services/*
          - "Sample_Api_Service"
      - name: environment
        value: "Dev"
        enum:
          - "Dev"
          - "Prod"
      - name: namespace             # target k8s namespace for the deployment/secret
      - name: env-var-name          # e.g. MYSQL_HOST
      - name: new-value
      - name: deployment-repo-url   # git URL for kubernetes manifest deployment

  templates:
    - name: main
      steps:
        - - name: locate-secret-ref
            template: locate-secret-ref

        - - name: manual-approval
            template: approval
            when: "{{workflow.parameters.environment}} == Prod"

        - - name: update-aws-secret
            template: update-aws-secret
            arguments:
              parameters:
                - name: aws-secret-name
                  value: "{{steps.locate-secret-ref.outputs.parameters.aws-secret-name}}"
                - name: aws-secret-key
                  value: "{{steps.locate-secret-ref.outputs.parameters.aws-secret-key}}"

        - - name: recreate-secret-and-restart
            template: restart-deployment
            arguments:
              parameters:
                - name: k8s-secret-name
                  value: "{{steps.locate-secret-ref.outputs.parameters.k8s-secret-name}}"

    # Finds which AWS Secrets Manager secret + JSON key back a given env var,
    # by tracing: deployment.yaml env[].valueFrom.secretKeyRef
    #          -> SecretProviderClass.spec.secretObjects[].data[] (k8s secret key -> object alias)
    #          -> SecretProviderClass.spec.parameters.objects (object alias -> AWS secret ARN + jmesPath)
    - name: locate-secret-ref
      outputs:
        parameters:
          - name: k8s-secret-name
            valueFrom: { path: /tmp/out/k8s-secret-name }
          - name: aws-secret-name
            valueFrom: { path: /tmp/out/aws-secret-name }
          - name: aws-secret-key
            valueFrom: { path: /tmp/out/aws-secret-key }
      script:
        image: <ECR_REPO>/argo-secret-ops-tools:latest  # git + yq v4
        command: [bash]
        source: |
          set -euo pipefail
          mkdir -p /tmp/out

          SERVICE="{{workflow.parameters.service}}"
          ENVIRONMENT="{{workflow.parameters.environment}}"
          ENV_VAR="{{workflow.parameters.env-var-name}}"

          git clone --depth 1 "{{workflow.parameters.deployment-repo-url}}" /tmp/repo
          OVERLAY_DIR="/tmp/repo/Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"

          DEPLOYMENT_FILE=$(find "$OVERLAY_DIR" -iname 'deployment*.yaml' | head -n1)
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          K8S_SECRET_NAME=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.name" "$DEPLOYMENT_FILE" | head -n1)
          K8S_SECRET_KEY=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.key" "$DEPLOYMENT_FILE" | head -n1)

          if [[ -z "$K8S_SECRET_NAME" || "$K8S_SECRET_NAME" == "null" ]]; then
            echo "Env var ${ENV_VAR} has no secretKeyRef in ${DEPLOYMENT_FILE} - is it a plain value, or is the name wrong?" >&2
            exit 1
          fi

          OBJECT_ALIAS=$(yq e ".spec.secretObjects[] | select(.secretName == \"${K8S_SECRET_NAME}\") | .data[] | select(.key == \"${K8S_SECRET_KEY}\") | .objectName" "$SPC_FILE" | head -n1)

          # parameters.objects is itself a YAML-encoded string on this CRD - decode, then query.
          AWS_SECRET_NAME=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .objectName" -)
          AWS_SECRET_KEY=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .jmesPath[] | select(.objectAlias == \"${OBJECT_ALIAS}\") | .path" -)

          echo -n "$K8S_SECRET_NAME" > /tmp/out/k8s-secret-name
          echo -n "$AWS_SECRET_NAME" > /tmp/out/aws-secret-name
          echo -n "$AWS_SECRET_KEY" > /tmp/out/aws-secret-key

    # Only reached when environment == Prod. Pauses indefinitely until
    # `argo resume <workflow>` (or an approval UI/bot wired to that command).
    - name: approval
      suspend: {}

    - name: update-aws-secret
      inputs:
        parameters:
          - name: aws-secret-name
          - name: aws-secret-key
      script:
        image: <ECR_REPO>/argo-secret-ops-tools:latest  # aws-cli v2 + jq
        command: [bash]
        source: |
          set -euo pipefail
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "{{inputs.parameters.aws-secret-name}}" \
            --query SecretString --output text)
          UPDATED=$(echo "$CURRENT" | jq --arg k "{{inputs.parameters.aws-secret-key}}" \
            --arg v "{{workflow.parameters.new-value}}" '.[$k] = $v')
          aws secretsmanager put-secret-value \
            --secret-id "{{inputs.parameters.aws-secret-name}}" \
            --secret-string "$UPDATED"

    - name: restart-deployment
      inputs:
        parameters:
          - name: k8s-secret-name
      script:
        image: <ECR_REPO>/argo-secret-ops-tools:latest  # kubectl
        command: [bash]
        source: |
          set -euo pipefail
          NS="{{workflow.parameters.namespace}}"
          SVC="{{workflow.parameters.service}}"

          # `service` is Title_Case to match the Kustomize folder name, but k8s
          # object names can't contain underscores/uppercase - the actual
          # Deployment is the kebab-case form (e.g. Sample_Api_Service -> sample-api-service).
          K8S_DEPLOYMENT=$(echo "$SVC" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          # Delete the CSI-synced k8s Secret so the driver recreates it with
          # the fresh value on next mount, rather than serving a cached copy.
          kubectl delete secret "{{inputs.parameters.k8s-secret-name}}" -n "$NS" --ignore-not-found

          kubectl rollout restart deployment/"$K8S_DEPLOYMENT" -n "$NS"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT" -n "$NS" --timeout=180s

# Rotates an existing env var's value: resolves it back to its AWS Secrets
# Manager secret + key via the SecretProviderClass, writes the new value,
# forces a CSI resync, and restarts the deployment. Needs infra/arc/
# deployed since this touches the cluster directly via dev-runners.
#
# Only Sample_Api_Service/Dev is wired up (Kustomize overlay + runner pool +
# RoleBinding all exist for just that combo) - adding another service or
# environment means adding its overlay, its own AutoscalingRunnerSet +
# RoleBinding under infra/arc/, and a runs-on branch here.
#
# One-time repo setup: a GitHub Environment named "Dev" (required reviewers
# added as more environments come online - see infra/arc/README.md), and
# repository Variable AWS_REGION (see infra/README.md).
name: secret-update

on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        options:
          - Sample_Api_Service
        default: Sample_Api_Service
      environment:
        type: choice
        options: [Dev]
        default: Dev
      namespace:
        type: choice
        options:
          - sample-api-service-dev
        default: sample-api-service-dev
      env-var-name:
        description: e.g. DB_PASSWORD
        required: true
      new-value:
        required: true

permissions:
  contents: read

jobs:
  locate-secret-ref:
    runs-on: dev-runners
    outputs:
      k8s-secret-name: ${{ steps.locate.outputs.k8s-secret-name }}
      aws-secret-name: ${{ steps.locate.outputs.aws-secret-name }}
      aws-secret-key: ${{ steps.locate.outputs.aws-secret-key }}
    steps:
      - uses: actions/checkout@v4
      - id: locate
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service }}"
          ENVIRONMENT="${{ inputs.environment }}"
          ENV_VAR="${{ inputs.env-var-name }}"
          OVERLAY_DIR="Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"

          DEPLOYMENT_FILE=$(find "$OVERLAY_DIR" -iname 'deployment*.yaml' | head -n1)
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          K8S_SECRET_NAME=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.name" "$DEPLOYMENT_FILE" | head -n1)
          K8S_SECRET_KEY=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.key" "$DEPLOYMENT_FILE" | head -n1)

          if [[ -z "$K8S_SECRET_NAME" || "$K8S_SECRET_NAME" == "null" ]]; then
            echo "Env var ${ENV_VAR} has no secretKeyRef in ${DEPLOYMENT_FILE} - is it a plain value, or is the name wrong?" >&2
            exit 1
          fi

          OBJECT_ALIAS=$(yq e ".spec.secretObjects[] | select(.secretName == \"${K8S_SECRET_NAME}\") | .data[] | select(.key == \"${K8S_SECRET_KEY}\") | .objectName" "$SPC_FILE" | head -n1)

          AWS_SECRET_NAME=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .objectName" -)
          AWS_SECRET_KEY=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .jmesPath[] | select(.objectAlias == \"${OBJECT_ALIAS}\") | .path" -)

          echo "k8s-secret-name=$K8S_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "aws-secret-name=$AWS_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "aws-secret-key=$AWS_SECRET_KEY" >> "$GITHUB_OUTPUT"

  update-aws-secret:
    needs: locate-secret-ref
    # Same Environment as restart-deployment below - GitHub only asks for
    # approval once per (run, environment), not per job.
    environment: ${{ inputs.environment }}
    runs-on: dev-runners
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
      # Via env, not ${{ inputs.new-value }} inline - the runner echoes the
      # resolved script as its log header before executing, which would
      # leak the plaintext even with ::add-mask:: below.
      NEW_VALUE: ${{ inputs.new-value }}
    steps:
      - run: |
          set -euo pipefail
          VALUE="$NEW_VALUE"
          echo "::add-mask::$VALUE"

          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "${{ needs.locate-secret-ref.outputs.aws-secret-name }}" \
            --query SecretString --output text)
          UPDATED=$(echo "$CURRENT" | jq --arg k "${{ needs.locate-secret-ref.outputs.aws-secret-key }}" \
            --arg v "$VALUE" '.[$k] = $v')
          aws secretsmanager put-secret-value \
            --secret-id "${{ needs.locate-secret-ref.outputs.aws-secret-name }}" \
            --secret-string "$UPDATED"

  restart-deployment:
    needs: [locate-secret-ref, update-aws-secret]
    environment: ${{ inputs.environment }}
    runs-on: dev-runners
    steps:
      - run: |
          set -euo pipefail
          SVC="${{ inputs.service }}"
          NS="${{ inputs.namespace }}"
          K8S_DEPLOYMENT=$(echo "$SVC" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          kubectl delete secret "${{ needs.locate-secret-ref.outputs.k8s-secret-name }}" -n "$NS" --ignore-not-found
          kubectl rollout restart deployment/"$K8S_DEPLOYMENT" -n "$NS"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT" -n "$NS" --timeout=180s

          {
            echo "### :white_check_mark: Secret rotated"
            echo
            echo "| | |"
            echo "|---|---|"
            echo "| Env var | \`${{ inputs.env-var-name }}\` |"
            echo "| Service / environment | \`${SVC}\` / \`${{ inputs.environment }}\` |"
            echo "| Namespace | \`${NS}\` |"
            echo "| AWS secret | \`${{ needs.locate-secret-ref.outputs.aws-secret-name }}\` |"
            echo "| k8s Secret | \`${{ needs.locate-secret-ref.outputs.k8s-secret-name }}\` |"
            echo "| Deployment | \`${K8S_DEPLOYMENT}\` restarted, rollout complete |"
          } >> "$GITHUB_STEP_SUMMARY"

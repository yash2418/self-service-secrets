# Rotates the value of an env var already wired into a deployment: resolves
# it back to its AWS Secrets Manager secret + key via the SecretProviderClass,
# writes the new value, forces the CSI-synced k8s Secret to resync, and
# restarts the deployment. Needs infra/arc/ deployed (ARC + per-env runner
# pools) since update-aws-secret/restart-deployment require direct kubectl
# access to the cluster.
#
# Only Sample_Api_Service/Dev is wired end-to-end right now (Kustomize
# overlay + runner pool + RoleBinding all exist for that combo only), so the
# service/environment inputs are pruned down to just that choice. Adding
# another service or environment means adding its Kustomize overlay, its own
# AutoscalingRunnerSet + RoleBinding under infra/arc/, and a runs-on branch
# here - then it can be added back to the choice lists below.
#
# namespace is a `choice` input, not free text - it must match an existing
# RoleBinding (infra/arc/rbac/dev-rolebinding.yaml), so the option list here
# should only ever contain namespaces that actually have one.
#
# update-aws-secret and restart-deployment both gate on the same
# "<environment>" Environment (e.g. "Dev") - GitHub only asks for approval
# once per (run, environment), not per job, so required reviewers on that
# one Environment blocks the whole run (AWS write + rollout restart) behind
# a single approval rather than needing a second Environment just for the
# restart.
#
# update-aws-secret's aws CLI calls rely on the repository Variable
# AWS_REGION (Settings -> Secrets and variables -> Actions -> Variables)
# rather than the dev-runners pod's EC2 instance-metadata region fallback -
# that fallback happens to resolve correctly today since the cluster's
# nodes are in the same region as the secret, but making it explicit means
# this doesn't silently break if that ever isn't true (e.g. cross-region
# secrets, or a runner pool on different nodes).
#
# One-time repo setup (not expressible in this YAML):
#   - create a GitHub Environment named exactly "Dev" (and "Prod"/etc. as
#     more environments come online)
#   - add required reviewers to it - see infra/arc/README.md for the
#     click-path
#   - set repository Variable AWS_REGION - see infra/README.md
name: secret-update

on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        options:
          - Sample_Api_Service
        default: Sample_Api_Service
      environment:
        type: choice
        options: [Dev]
        default: Dev
      namespace:
        type: choice
        options:
          - sample-api-service-dev
        default: sample-api-service-dev
      env-var-name:
        description: e.g. DB_PASSWORD
        required: true
      new-value:
        required: true

permissions:
  contents: read

jobs:
  locate-secret-ref:
    runs-on: dev-runners
    outputs:
      k8s-secret-name: ${{ steps.locate.outputs.k8s-secret-name }}
      aws-secret-name: ${{ steps.locate.outputs.aws-secret-name }}
      aws-secret-key: ${{ steps.locate.outputs.aws-secret-key }}
    steps:
      - uses: actions/checkout@v4
      - id: locate
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service }}"
          ENVIRONMENT="${{ inputs.environment }}"
          ENV_VAR="${{ inputs.env-var-name }}"
          OVERLAY_DIR="Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"

          DEPLOYMENT_FILE=$(find "$OVERLAY_DIR" -iname 'deployment*.yaml' | head -n1)
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          K8S_SECRET_NAME=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.name" "$DEPLOYMENT_FILE" | head -n1)
          K8S_SECRET_KEY=$(yq e ".spec.template.spec.containers[].env[] | select(.name == \"${ENV_VAR}\") | .valueFrom.secretKeyRef.key" "$DEPLOYMENT_FILE" | head -n1)

          if [[ -z "$K8S_SECRET_NAME" || "$K8S_SECRET_NAME" == "null" ]]; then
            echo "Env var ${ENV_VAR} has no secretKeyRef in ${DEPLOYMENT_FILE} - is it a plain value, or is the name wrong?" >&2
            exit 1
          fi

          OBJECT_ALIAS=$(yq e ".spec.secretObjects[] | select(.secretName == \"${K8S_SECRET_NAME}\") | .data[] | select(.key == \"${K8S_SECRET_KEY}\") | .objectName" "$SPC_FILE" | head -n1)

          AWS_SECRET_NAME=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .objectName" -)
          AWS_SECRET_KEY=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${OBJECT_ALIAS}\") | .jmesPath[] | select(.objectAlias == \"${OBJECT_ALIAS}\") | .path" -)

          echo "k8s-secret-name=$K8S_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "aws-secret-name=$AWS_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "aws-secret-key=$AWS_SECRET_KEY" >> "$GITHUB_OUTPUT"

  update-aws-secret:
    needs: locate-secret-ref
    # environment: gates this job behind whichever GitHub Environment's
    # required-reviewers rule matches inputs.environment - a no-op today
    # since "Dev" is unprotected, but carries forward once Prod exists.
    environment: ${{ inputs.environment }}
    runs-on: dev-runners
    env:
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - run: |
          set -euo pipefail
          CURRENT=$(aws secretsmanager get-secret-value \
            --secret-id "${{ needs.locate-secret-ref.outputs.aws-secret-name }}" \
            --query SecretString --output text)
          UPDATED=$(echo "$CURRENT" | jq --arg k "${{ needs.locate-secret-ref.outputs.aws-secret-key }}" \
            --arg v "${{ inputs.new-value }}" '.[$k] = $v')
          aws secretsmanager put-secret-value \
            --secret-id "${{ needs.locate-secret-ref.outputs.aws-secret-name }}" \
            --secret-string "$UPDATED"

  restart-deployment:
    needs: [locate-secret-ref, update-aws-secret]
    # Same Environment as update-aws-secret - GitHub only asks for approval
    # once per (run, environment), not per job, so required reviewers on
    # this one Environment gates the whole run (AWS write + restart) behind
    # a single approval rather than needing two separate Environments.
    environment: ${{ inputs.environment }}
    runs-on: dev-runners
    steps:
      - run: |
          set -euo pipefail
          SVC="${{ inputs.service }}"
          NS="${{ inputs.namespace }}"

          # service is Title_Case to match the Kustomize folder name; the
          # actual k8s Deployment is kebab-case (k8s names can't have
          # underscores/uppercase) - e.g. Sample_Api_Service -> sample-api-service.
          K8S_DEPLOYMENT=$(echo "$SVC" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          kubectl delete secret "${{ needs.locate-secret-ref.outputs.k8s-secret-name }}" -n "$NS" --ignore-not-found
          kubectl rollout restart deployment/"$K8S_DEPLOYMENT" -n "$NS"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT" -n "$NS" --timeout=180s

# Provisions/updates the AWS secret for a brand-new env var, patches the
# SecretProviderClass and deployment.yaml on a new branch, and opens a PR.
# Merging it lets Argo CD sync normally - the changed pod spec triggers the
# deployment restart and the CSI driver provisions the secret, so no direct
# cluster write happens here. This flow never touches the cluster directly,
# so it runs entirely on GitHub-hosted runners - no ARC/self-hosted runner
# needed. AWS auth is via OIDC role assumption instead of IRSA, and git
# push/PR creation uses the built-in GITHUB_TOKEN, since the workflow already
# lives in this repo.
name: secret-create

on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        options:
          - Admin_Auth_Service
          - Sample_Api_Service
        default: Sample_Api_Service
      environment:
        type: choice
        options: [Dev, Prod, QA, QAAuto, Sandbox, Staging]
        default: Dev
      env-var-name:
        description: e.g. NEW_API_KEY
        required: true
      initial-value:
        required: true
      aws-secret-name:
        description: existing or new AWS Secrets Manager secret name/ARN
        required: true
      k8s-secret-name:
        description: k8s Secret the SecretProviderClass syncs into
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ensure-aws-secret:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::<ACCOUNT_ID>:role/gha-secret-ops
          aws-region: us-east-1
      - run: |
          set -euo pipefail
          NAME="${{ inputs.aws-secret-name }}"
          KEY="${{ inputs.env-var-name }}"
          VALUE="${{ inputs.initial-value }}"

          if aws secretsmanager describe-secret --secret-id "$NAME" >/dev/null 2>&1; then
            CURRENT=$(aws secretsmanager get-secret-value --secret-id "$NAME" --query SecretString --output text)
            UPDATED=$(echo "$CURRENT" | jq --arg k "$KEY" --arg v "$VALUE" '.[$k] = $v')
            aws secretsmanager put-secret-value --secret-id "$NAME" --secret-string "$UPDATED"
          else
            aws secretsmanager create-secret --name "$NAME" \
              --secret-string "$(jq -n --arg k "$KEY" --arg v "$VALUE" '{($k): $v}')"
          fi

  patch-manifests:
    needs: ensure-aws-secret
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.patch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
      - name: install yq
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - id: patch
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service }}"
          ENVIRONMENT="${{ inputs.environment }}"
          ENV_VAR="${{ inputs.env-var-name }}"
          AWS_SECRET_NAME="${{ inputs.aws-secret-name }}"
          K8S_SECRET_NAME="${{ inputs.k8s-secret-name }}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          BRANCH="secret/${SERVICE}-${ENVIRONMENT}-${ENV_VAR}-${{ github.run_id }}"
          git checkout -b "$BRANCH"

          OVERLAY_DIR="Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"
          DEPLOYMENT_FILE=$(find "$OVERLAY_DIR" -iname 'deployment*.yaml' | head -n1)
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          # 1. Add the new object + jmesPath mapping into parameters.objects
          #    (that field is a YAML string embedded in the CRD - decode, edit, re-encode).
          DECODED=$(yq e '.spec.parameters.objects' "$SPC_FILE")
          UPDATED_OBJECTS=$(echo "$DECODED" | yq e ". + [{\"objectName\": \"${AWS_SECRET_NAME}\", \"jmesPath\": [{\"path\": \"${ENV_VAR}\", \"objectAlias\": \"${ENV_VAR}\"}]}]" -)
          yq e ".spec.parameters.objects = \"$(echo "$UPDATED_OBJECTS" | sed ':a;N;$!ba;s/\n/\\n/g')\"" -i "$SPC_FILE"

          # 2. Point the synced k8s Secret at the new alias/key.
          yq e ".spec.secretObjects[0].data += [{\"objectName\": \"${ENV_VAR}\", \"key\": \"${ENV_VAR}\"}]" -i "$SPC_FILE"

          # 3. Wire the env var into the deployment container.
          yq e ".spec.template.spec.containers[0].env += [{\"name\": \"${ENV_VAR}\", \"valueFrom\": {\"secretKeyRef\": {\"name\": \"${K8S_SECRET_NAME}\", \"key\": \"${ENV_VAR}\"}}}]" -i "$DEPLOYMENT_FILE"

          git add "$SPC_FILE" "$DEPLOYMENT_FILE"
          git commit -m "chore: add ${ENV_VAR} secret for ${SERVICE} (${ENVIRONMENT})"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  open-pr:
    needs: patch-manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --title "Add secret ${{ inputs.env-var-name }} to ${{ inputs.service }} (${{ inputs.environment }})" \
            --body "Auto-generated by secret-create. Merging will let Argo CD sync the SecretProviderClass and deployment changes, provisioning the secret and restarting the deployment." \
            --base main \
            --head "${{ needs.patch-manifests.outputs.branch }}"

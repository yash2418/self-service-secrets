# Provisions/updates the AWS secret for a brand-new env var, patches the
# SecretProviderClass and deployment.yaml on a new branch, and opens a PR.
#
# aws-secret-name and k8s-secret-name are NOT workflow inputs - they're
# per-service+environment constants (every env var for this service/env
# shares the same underlying AWS secret and k8s Secret), so locate-targets
# reads them straight out of the existing SecretProviderClass instead of
# trusting a human to retype them correctly every run. Requires exactly one
# entry in spec.parameters.objects and spec.secretObjects - if either SPC
# ever grows a second entry, this job fails loudly rather than guessing.
#
# ensure-aws-secret/patch-manifests/open-pr never touch the cluster, so they
# run on GitHub-hosted runners with AWS auth via OIDC role assumption and
# git push/PR creation via the built-in GITHUB_TOKEN.
#
# wait-for-merge then polls (up to 6h) until that PR merges, and
# apply-changes does the actual rollout restart afterwards - this needs
# infra/arc/ deployed (same as secret-update.yml) since it's direct kubectl
# access to the cluster, hence dev-runners instead of ubuntu-latest for that
# last job. Argo CD would eventually sync the merged manifest changes on its
# own poll interval regardless, but this makes the restart immediate and
# gives the workflow run a pass/fail signal instead of a silent wait.
#
# Only Sample_Api_Service/Dev is wired end-to-end right now - see the
# comment in secret-update.yml for why the choice inputs are pruned to just
# that combination.
#
# Requires repository Variables (Settings -> Secrets and variables ->
# Actions -> Variables) AWS_SECRET_OPS_ROLE_ARN and AWS_REGION - see
# infra/README.md for the click-path and
# infra/eks/iam-trust-policy-secret-ops.json + iam-policy-secret-ops.json
# for the role these credentials assume.
name: secret-create

on:
  workflow_dispatch:
    inputs:
      service:
        type: choice
        options:
          - Sample_Api_Service
        default: Sample_Api_Service
      environment:
        type: choice
        options: [Dev]
        default: Dev
      namespace:
        type: choice
        options:
          - sample-api-service-dev
        default: sample-api-service-dev
      env-var-name:
        description: e.g. NEW_API_KEY
        required: true
      initial-value:
        required: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  locate-targets:
    runs-on: ubuntu-latest
    outputs:
      aws-secret-name: ${{ steps.locate.outputs.aws-secret-name }}
      k8s-secret-name: ${{ steps.locate.outputs.k8s-secret-name }}
    steps:
      - uses: actions/checkout@v4
      - name: install yq
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - id: locate
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service }}"
          ENVIRONMENT="${{ inputs.environment }}"
          OVERLAY_DIR="Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          OBJECT_COUNT=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e 'length' -)
          if [[ "$OBJECT_COUNT" != "1" ]]; then
            echo "Expected exactly one entry in spec.parameters.objects in ${SPC_FILE}, found ${OBJECT_COUNT} - aws-secret-name can't be inferred unambiguously." >&2
            exit 1
          fi
          AWS_SECRET_NAME=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e '.[0].objectName' -)

          SECRET_OBJECTS_COUNT=$(yq e '.spec.secretObjects | length' "$SPC_FILE")
          if [[ "$SECRET_OBJECTS_COUNT" != "1" ]]; then
            echo "Expected exactly one entry in spec.secretObjects in ${SPC_FILE}, found ${SECRET_OBJECTS_COUNT} - k8s-secret-name can't be inferred unambiguously." >&2
            exit 1
          fi
          K8S_SECRET_NAME=$(yq e '.spec.secretObjects[0].secretName' "$SPC_FILE")

          echo "aws-secret-name=$AWS_SECRET_NAME" >> "$GITHUB_OUTPUT"
          echo "k8s-secret-name=$K8S_SECRET_NAME" >> "$GITHUB_OUTPUT"

  ensure-aws-secret:
    needs: locate-targets
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_SECRET_OPS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - run: |
          set -euo pipefail
          NAME="${{ needs.locate-targets.outputs.aws-secret-name }}"
          KEY="${{ inputs.env-var-name }}"
          VALUE="${{ inputs.initial-value }}"

          if aws secretsmanager describe-secret --secret-id "$NAME" >/dev/null 2>&1; then
            CURRENT=$(aws secretsmanager get-secret-value --secret-id "$NAME" --query SecretString --output text)
            UPDATED=$(echo "$CURRENT" | jq --arg k "$KEY" --arg v "$VALUE" '.[$k] = $v')
            aws secretsmanager put-secret-value --secret-id "$NAME" --secret-string "$UPDATED"
          else
            aws secretsmanager create-secret --name "$NAME" \
              --secret-string "$(jq -n --arg k "$KEY" --arg v "$VALUE" '{($k): $v}')"
          fi

  patch-manifests:
    needs: [locate-targets, ensure-aws-secret]
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.patch.outputs.branch }}
    steps:
      - uses: actions/checkout@v4
      - name: install yq
        run: |
          sudo curl -fsSL https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - id: patch
        run: |
          set -euo pipefail
          SERVICE="${{ inputs.service }}"
          ENVIRONMENT="${{ inputs.environment }}"
          ENV_VAR="${{ inputs.env-var-name }}"
          AWS_SECRET_NAME="${{ needs.locate-targets.outputs.aws-secret-name }}"
          K8S_SECRET_NAME="${{ needs.locate-targets.outputs.k8s-secret-name }}"

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          BRANCH="secret/${SERVICE}-${ENVIRONMENT}-${ENV_VAR}-${{ github.run_id }}"
          git checkout -b "$BRANCH"

          OVERLAY_DIR="Kustomize/Services/${SERVICE}/Overlays/${ENVIRONMENT}"
          DEPLOYMENT_FILE=$(find "$OVERLAY_DIR" -iname 'deployment*.yaml' | head -n1)
          SPC_FILE=$(find "$OVERLAY_DIR" -iname '*secretproviderclass*.yaml' | head -n1)

          # Refuse to run if the env var is already wired up - this workflow
          # only adds new secrets; rotating an existing one is secret-update's job.
          EXISTING=$(yq e '.spec.parameters.objects' "$SPC_FILE" | yq e ".[] | select(.jmesPath[]?.objectAlias == \"${ENV_VAR}\") | .objectName" -)
          if [[ -n "$EXISTING" && "$EXISTING" != "null" ]]; then
            echo "${ENV_VAR} already has a jmesPath entry in ${SPC_FILE} (objectName: ${EXISTING}) - use secret-update to rotate its value instead." >&2
            exit 1
          fi

          # The target k8s Secret must already have a secretObjects entry -
          # this workflow adds a key to an existing Secret, it doesn't stand
          # up a brand-new secretObjects block for a Secret name never seen before.
          if ! yq e ".spec.secretObjects[] | select(.secretName == \"${K8S_SECRET_NAME}\")" "$SPC_FILE" | grep -q .; then
            echo "No spec.secretObjects entry for secretName ${K8S_SECRET_NAME} in ${SPC_FILE} - add that block by hand first." >&2
            exit 1
          fi

          # 1. Add the new jmesPath mapping to the EXISTING entry for this
          #    AWS object (matched by objectName, which locate-targets
          #    derived from that same entry, so it's guaranteed to match) -
          #    not a whole new top-level entry. A second entry duplicating
          #    objectName is both redundant (the CSI driver would fetch the
          #    same secret twice) and broken: ASCP requires objectType
          #    whenever objectName isn't a full ARN, and only the original
          #    entry carries it.
          #    (that field is a YAML string embedded in the CRD - decode, edit, re-encode).
          #    strenv() injects UPDATED_OBJECTS as a raw string with no
          #    manual quote/newline escaping - the existing entries in this
          #    field are already double-quoted YAML, and hand-escaping that
          #    into an outer "..." literal (the previous approach) breaks
          #    the moment those inner quotes aren't also escaped.
          DECODED=$(yq e '.spec.parameters.objects' "$SPC_FILE")
          UPDATED_OBJECTS=$(echo "$DECODED" | yq e "(.[] | select(.objectName == \"${AWS_SECRET_NAME}\") | .jmesPath) += [{\"path\": \"${ENV_VAR}\", \"objectAlias\": \"${ENV_VAR}\"}]" -)
          export UPDATED_OBJECTS
          yq e '.spec.parameters.objects = strenv(UPDATED_OBJECTS)' -i "$SPC_FILE"

          # 2. Point the synced k8s Secret at the new alias/key - matched by
          #    secretName rather than a hardcoded [0] index, since a SPC can
          #    define secretObjects for more than one k8s Secret.
          yq e "(.spec.secretObjects[] | select(.secretName == \"${K8S_SECRET_NAME}\") | .data) += [{\"objectName\": \"${ENV_VAR}\", \"key\": \"${ENV_VAR}\"}]" -i "$SPC_FILE"

          # 3. Wire the env var into the deployment container.
          yq e ".spec.template.spec.containers[0].env += [{\"name\": \"${ENV_VAR}\", \"valueFrom\": {\"secretKeyRef\": {\"name\": \"${K8S_SECRET_NAME}\", \"key\": \"${ENV_VAR}\"}}}]" -i "$DEPLOYMENT_FILE"

          git add "$SPC_FILE" "$DEPLOYMENT_FILE"
          git commit -m "chore: add ${ENV_VAR} secret for ${SERVICE} (${ENVIRONMENT})"
          git push origin "$BRANCH"

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

  open-pr:
    needs: patch-manifests
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.create.outputs.pr-number }}
    steps:
      - uses: actions/checkout@v4
      - id: create
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_URL=$(gh pr create \
            --title "Add secret ${{ inputs.env-var-name }} to ${{ inputs.service }} (${{ inputs.environment }})" \
            --body "Auto-generated by secret-create. Merging will let Argo CD sync the SecretProviderClass and deployment changes; the apply-changes job then restarts the deployment directly instead of waiting on Argo CD's poll interval." \
            --base main \
            --head "${{ needs.patch-manifests.outputs.branch }}")
          echo "pr-number=$(basename "$PR_URL")" >> "$GITHUB_OUTPUT"

  wait-for-merge:
    needs: open-pr
    runs-on: ubuntu-latest
    # Hard ceiling on how long a runner sits polling for a human review/merge.
    # If this elapses before the PR merges, apply-changes below just never
    # runs - the PR itself is untouched and can still be merged manually,
    # but re-running the rollout restart would need a fresh workflow run.
    timeout-minutes: 360
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER="${{ needs.open-pr.outputs.pr-number }}"
          echo "Waiting for PR #${PR_NUMBER} to merge (polling every 30s)..."
          while true; do
            STATE=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json state -q .state)
            case "$STATE" in
              MERGED)
                echo "PR #${PR_NUMBER} merged."
                exit 0
                ;;
              CLOSED)
                echo "PR #${PR_NUMBER} was closed without merging - aborting." >&2
                exit 1
                ;;
            esac
            sleep 30
          done

  apply-changes:
    needs: [locate-targets, patch-manifests, wait-for-merge]
    # Gates behind the Prod Environment's required reviewers once Prod
    # exists, same as secret-update.yml - a no-op today since only "Dev" is
    # wired up and unprotected.
    environment: ${{ inputs.environment }}
    runs-on: dev-runners
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - run: |
          set -euo pipefail
          SVC="${{ inputs.service }}"
          NS="${{ inputs.namespace }}"
          K8S_SECRET_NAME="${{ needs.locate-targets.outputs.k8s-secret-name }}"

          # service is Title_Case to match the Kustomize folder name; the
          # actual k8s Deployment is kebab-case (k8s names can't have
          # underscores/uppercase) - e.g. Sample_Api_Service -> sample-api-service.
          K8S_DEPLOYMENT=$(echo "$SVC" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

          # Deployment's pod template already changed (new env var), so
          # Argo CD's own sync would eventually restart it anyway - deleting
          # the k8s Secret first and restarting explicitly here just forces
          # an immediate CSI resync instead of waiting on Argo CD's poll
          # interval, same as restart-deployment in secret-update.yml.
          kubectl delete secret "$K8S_SECRET_NAME" -n "$NS" --ignore-not-found
          kubectl rollout restart deployment/"$K8S_DEPLOYMENT" -n "$NS"
          kubectl rollout status deployment/"$K8S_DEPLOYMENT" -n "$NS" --timeout=180s
